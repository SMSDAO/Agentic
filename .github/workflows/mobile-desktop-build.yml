name: Platform Isolation Notice

# Non-web platform builds have been moved to dedicated repositories:
#   SMSDAO/Agentic-Admin    — Tauri desktop admin panel
#   SMSDAO/Agentic-Desktop  — Electron desktop application
#   SMSDAO/Agentic-Mobile   — React Native / Expo mobile app
#
# This workflow is intentionally a no-op. CI for this repository is handled
# exclusively by web-build.yml, security-audit.yml, ai-integration-test.yml,
# and blockchain-test.yml.

on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Platform isolation notice
        run: |
          echo "Mobile and desktop builds have been moved to dedicated repositories."
          echo "See organization-map.json for repository locations."