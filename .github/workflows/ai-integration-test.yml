name: AI Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/services/ai/**'
      - 'src/lib/ai/**'
      - 'src/app/api/ai/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/services/ai/**'
      - 'src/lib/ai/**'
      - 'src/app/api/ai/**'

jobs:
  ai-type-check:
    name: Type-check AI service layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check AI services
        run: npm run type-check
