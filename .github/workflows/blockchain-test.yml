name: Blockchain Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/solana/**'
      - 'config/chains.ts'
      - 'src/app/api/balance/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/lib/solana/**'
      - 'config/chains.ts'
      - 'src/app/api/balance/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  solana-type-check:
    name: Type-check Solana integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
