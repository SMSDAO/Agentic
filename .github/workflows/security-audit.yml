name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (full report)
        # Print all vulnerabilities for visibility; does not block the workflow
        run: npm audit --omit=dev || true
      - name: Fail on critical vulnerabilities
        # bigint-buffer 1.1.5 (latest, GHSA-3gc7-fjrx-p6mg) in @solana/spl-token's dep tree
        # has no patched version — 1.1.5 is the newest release and still affects all versions.
        # All other critical issues are resolved via package.json overrides
        # (form-data>=4.0.4, aptos>=1.22.0).
        # Audit-level=critical is the appropriate threshold for this blockchain project.
        run: npm audit --audit-level=critical --omit=dev
